# NetBox Community Edition - gebaseerd op netbox-community/netbox-docker
# Zie https://github.com/netbox-community/netbox-docker

services:
  netbox:
    &netbox
    image: docker.io/netboxcommunity/netbox:${VERSION:-v4.5-4.0.0}
    depends_on:
      - postgres
      - redis
      - redis-cache
    env_file:
      - env/netbox.env
      - env/netbox.generated.env
    user: "netbox:root"
    # Healthcheck uit: eerste start duurt lang (migraties), worker mag direct starten
    healthcheck:
      disable: true
    volumes:
      - ./configuration:/etc/netbox/config:z,ro
      - netbox-media-files:/opt/netbox/netbox/media:rw
      - netbox-reports-files:/opt/netbox/netbox/reports:rw
      - netbox-scripts-files:/opt/netbox/netbox/scripts:rw

  netbox-worker:
    <<: *netbox
    depends_on:
      - netbox
    command:
      - /opt/netbox/venv/bin/python
      - /opt/netbox/netbox/manage.py
      - rqworker
    healthcheck:
      test: ["CMD-SHELL", "ps -aux | grep -v grep | grep -q rqworker || exit 1"]
      start_period: 20s
      timeout: 3s
      interval: 15s

  postgres:
    image: docker.io/postgres:18-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -t 2 -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      start_period: 20s
      timeout: 30s
      interval: 10s
      retries: 5
    env_file:
      - env/postgres.env
    volumes:
      - netbox-postgres:/var/lib/postgresql/data

  redis:
    image: docker.io/valkey/valkey:9.0-alpine
    command: ["sh", "-c", "valkey-server --appendonly yes --requirepass $$REDIS_PASSWORD"]
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$$REDIS_PASSWORD\" ping"]
      start_period: 5s
      timeout: 3s
      interval: 1s
      retries: 5
    env_file:
      - env/redis.env
    volumes:
      - netbox-redis-data:/data

  redis-cache:
    image: docker.io/valkey/valkey:9.0-alpine
    command: ["sh", "-c", "valkey-server --requirepass $$REDIS_PASSWORD"]
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$$REDIS_PASSWORD\" ping"]
      start_period: 5s
      timeout: 3s
      interval: 1s
      retries: 5
    env_file:
      - env/redis-cache.env
    volumes:
      - netbox-redis-cache-data:/data

volumes:
  netbox-media-files:
  netbox-postgres:
  netbox-redis-data:
  netbox-redis-cache-data:
  netbox-reports-files:
  netbox-scripts-files:
